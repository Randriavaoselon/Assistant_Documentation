
services:
  - type: web
    name: entreprise-rag-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/documents/categories/
    disk:
      name: entreprise-rag-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: GROQ_API_KEY
        sync: false # à renseigner manuellement dans le dashboard Render
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: RAG_TOP_K
        value: "5"
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173" # remplacez par votre URL Vercel une fois connue
      - key: PYTHON_VERSION
        value: "3.11.9"
